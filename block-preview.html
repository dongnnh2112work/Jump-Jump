<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Design Preview — Howl Jump</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      font-family: "Nunito", sans-serif;
      color: #fff;
      padding: 32px 24px;
    }
    h1 {
      font-family: "Fredoka One", cursive;
      font-size: 32px;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .subtitle { text-align: center; font-size: 14px; opacity: 0.6; margin-bottom: 40px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 20px 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: transform 0.15s, background 0.15s;
      cursor: default;
    }
    .card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.12); }
    .block-canvas { display: block; }
    .block-name { font-family: "Fredoka One", cursive; font-size: 17px; letter-spacing: 0.5px; }
    .block-meta { font-size: 11px; opacity: 0.5; text-align: center; line-height: 1.5; }
    .difficulty {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; margin-top: 1px;
    }
    .diff-easy   { background: rgba(126,212,74,0.22); color: #88D44A; border: 1px solid #88D44A55; }
    .diff-mid    { background: rgba(255,183,77,0.2);  color: #FFB74D; border: 1px solid #FFB74D55; }
    .diff-hard   { background: rgba(239,83,80,0.2);   color: #EF5350; border: 1px solid #EF535055; }
    .diff-expert { background: rgba(171,71,188,0.2);  color: #AB47BC; border: 1px solid #AB47BC55; }
    .section-label {
      grid-column: 1 / -1;
      font-family: "Fredoka One", cursive;
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0.4;
      text-transform: uppercase;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Block Design Preview</h1>
  <p class="subtitle">Howl Jump · 15 block types · all equal height (1 stack)</p>
  <div class="grid" id="grid"></div>

  <script>
  const W = 110, D = 55, H = 22, STACKS = 1;

  // ─── Core draw ─────────────────────────────────────────────────────────────

  function drawIsoBlock(ctx, cx, cy, colors, detailFn) {
    const hw = W/2, hd = D/2;
    const totalH = H * STACKS;
    const t = Math.min(0.1, 10 / Math.hypot(hw, hd));

    if (colors.glow) { ctx.shadowColor = colors.glow; ctx.shadowBlur = 18; }

    // TOP face
    ctx.beginPath();
    ctx.moveTo(cx + hw*t,       cy + hd*t);
    ctx.lineTo(cx + hw*(1-t),   cy + hd*(1-t));
    ctx.quadraticCurveTo(cx+hw, cy+hd, cx+hw*(1-t), cy+hd*(1+t));
    ctx.lineTo(cx + hw*t,       cy + D - hd*t);
    ctx.quadraticCurveTo(cx,    cy+D,  cx-hw*t,     cy+D-hd*t);
    ctx.lineTo(cx - hw*(1-t),   cy + hd*(1+t));
    ctx.quadraticCurveTo(cx-hw, cy+hd, cx-hw*(1-t), cy+hd*(1-t));
    ctx.lineTo(cx - hw*t,       cy + hd*t);
    ctx.quadraticCurveTo(cx,    cy,    cx+hw*t,      cy+hd*t);
    ctx.closePath();
    ctx.fillStyle = colors.top; ctx.fill();

    // Top edge highlight
    ctx.beginPath();
    ctx.moveTo(cx+hw*t,       cy+hd*t);
    ctx.lineTo(cx+hw*(1-t),   cy+hd*(1-t));
    ctx.quadraticCurveTo(cx+hw,cy+hd,cx+hw*(1-t),cy+hd*(1+t));
    ctx.lineTo(cx+hw*t,       cy+D-hd*t);
    ctx.quadraticCurveTo(cx,  cy+D, cx-hw*t,cy+D-hd*t);
    ctx.lineTo(cx-hw*(1-t),   cy+hd*(1+t));
    ctx.quadraticCurveTo(cx-hw,cy+hd,cx-hw*(1-t),cy+hd*(1-t));
    ctx.lineTo(cx-hw*t,       cy+hd*t);
    ctx.quadraticCurveTo(cx,  cy, cx+hw*t,cy+hd*t);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.32)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.shadowBlur = 0;

    // LEFT face
    const lg = ctx.createLinearGradient(cx-hw, cy+hd, cx-hw, cy+hd+totalH);
    lg.addColorStop(0, colors.left); lg.addColorStop(1, darken(colors.left, 0.15));
    ctx.beginPath();
    ctx.moveTo(cx-hw, cy+hd); ctx.lineTo(cx, cy+D);
    ctx.lineTo(cx, cy+D+totalH); ctx.lineTo(cx-hw, cy+hd+totalH);
    ctx.closePath(); ctx.fillStyle = lg; ctx.fill();

    // RIGHT face
    const rg = ctx.createLinearGradient(cx+hw, cy+hd, cx+hw, cy+hd+totalH);
    rg.addColorStop(0, colors.right); rg.addColorStop(1, darken(colors.right, 0.2));
    ctx.beginPath();
    ctx.moveTo(cx+hw, cy+hd); ctx.lineTo(cx, cy+D);
    ctx.lineTo(cx, cy+D+totalH); ctx.lineTo(cx+hw, cy+hd+totalH);
    ctx.closePath(); ctx.fillStyle = rg; ctx.fill();

    if (detailFn) detailFn(ctx, cx, cy, W, D, H);
  }

  function darken(hex, amt) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    const f = v => Math.max(0,Math.floor(v*(1-amt))).toString(16).padStart(2,'0');
    return `#${f(r)}${f(g)}${f(b)}`;
  }

  // ─── Detail functions ──────────────────────────────────────────────────────

  function detailMeadow(ctx, cx, cy, w, d) {
    const hw=w/2, hd=d/2;
    const pts = [[cx-hw*0.2,cy+hd*0.5],[cx+hw*0.08,cy+hd*0.75],[cx+hw*0.28,cy+hd*0.38]];
    const cols = ['#FF8FA3','#FFE082','#B2DFDB'];
    pts.forEach(([px,py],i) => {
      ctx.beginPath(); ctx.strokeStyle='rgba(0,0,0,0.22)'; ctx.lineWidth=1;
      ctx.moveTo(px,py); ctx.lineTo(px,py+5); ctx.stroke();
      ctx.fillStyle = cols[i];
      for (let a=0;a<5;a++) {
        const ang=(a/5)*Math.PI*2;
        ctx.beginPath(); ctx.arc(px+Math.cos(ang)*4, py+Math.sin(ang)*2.5, 2.5, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle='#FFF9C4'; ctx.beginPath(); ctx.arc(px,py,2,0,Math.PI*2); ctx.fill();
    });
  }

  function detailSakura(ctx, cx, cy, w, d) {
    const hw=w/2, hd=d/2, px=cx, py=cy+hd;
    for (let a=0;a<5;a++) {
      const ang=(a/5)*Math.PI*2-Math.PI/2, ex=px+Math.cos(ang)*10, ey=py+Math.sin(ang)*6;
      ctx.beginPath(); ctx.fillStyle='rgba(255,255,255,0.85)';
      ctx.ellipse(ex,ey,5,3.5,ang,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='#FFD1DC'; ctx.beginPath(); ctx.arc(px,py,3.5,0,Math.PI*2); ctx.fill();
    [[cx-hw*0.3,cy+hd*0.4],[cx+hw*0.22,cy+hd*0.5]].forEach(([bx,by]) => {
      for (let a=0;a<5;a++) {
        const ang=(a/5)*Math.PI*2-Math.PI/2;
        ctx.beginPath(); ctx.fillStyle='rgba(255,255,255,0.5)';
        ctx.ellipse(bx+Math.cos(ang)*5,by+Math.sin(ang)*3.5,3,2,ang,0,Math.PI*2); ctx.fill();
      }
    });
  }

  function detailTimber(ctx, cx, cy, w, d) {
    const hd=d/2;
    [14,10,6,3].forEach((r,i) => {
      ctx.beginPath(); ctx.ellipse(cx,cy+hd,r,r*0.55,0,0,Math.PI*2);
      ctx.strokeStyle=`rgba(0,0,0,${0.12+i*0.03})`; ctx.lineWidth=0.8; ctx.stroke();
    });
    ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.arc(cx,cy+hd,1.5,0,Math.PI*2); ctx.fill();
  }

  function detailCobblestone(ctx, cx, cy, w, d) {
    const hw=w/2, hd=d/2;
    [[cx-hw*0.38,cy+hd*0.42,hw*0.34,hd*0.34],[cx+hw*0.1,cy+hd*0.28,hw*0.32,hd*0.28],
     [cx-hw*0.12,cy+hd*0.82,hw*0.36,hd*0.3],[cx+hw*0.28,cy+hd*0.7,hw*0.3,hd*0.28]
    ].forEach(([sx,sy,sw,sh]) => {
      ctx.beginPath(); ctx.roundRect(sx-sw/2,sy-sh/2,sw,sh,2);
      ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fill();
    });
  }

  function detailCrystalIce(ctx, cx, cy, w, d) {
    const hd=d/2;
    for (let i=0;i<6;i++) {
      const ang=(i/6)*Math.PI*2, ex=cx+Math.cos(ang)*15, ey=cy+hd+Math.sin(ang)*8;
      ctx.beginPath(); ctx.moveTo(cx,cy+hd); ctx.lineTo(ex,ey);
      ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1.2; ctx.stroke();
      const mx=cx+Math.cos(ang)*10, my=cy+hd+Math.sin(ang)*5.5, perp=ang+Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(mx+Math.cos(perp)*3,my+Math.sin(perp)*1.8);
      ctx.lineTo(mx-Math.cos(perp)*3,my-Math.sin(perp)*1.8);
      ctx.stroke();
    }
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(cx,cy+hd,2.5,0,Math.PI*2); ctx.fill();
  }

  function detailCandy(ctx, cx, cy, w, d) {
    const hd=d/2, px=cx, py=cy+hd;
    for (const sign of [1,-1]) {
      ctx.beginPath(); ctx.strokeStyle=`rgba(255,255,255,${sign>0?0.75:0.42})`; ctx.lineWidth=1.5;
      for (let a=0;a<=Math.PI*2.5;a+=0.08) {
        const r=(a/(Math.PI*2.5))*13, x=px+sign*Math.cos(a)*r, y=py+Math.sin(a)*r*0.58;
        a===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
    ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.arc(px,py,2,0,Math.PI*2); ctx.fill();
  }

  function detailLava(ctx, cx, cy, w, d) {
    const hw=w/2, hd=d/2;
    ctx.shadowColor='#FF6D00'; ctx.shadowBlur=6;
    [[[cx-hw*0.1,cy+hd*0.4],[cx+hw*0.05,cy+hd*0.75],[cx-hw*0.08,cy+hd*1.1]],
     [[cx+hw*0.22,cy+hd*0.55],[cx+hw*0.08,cy+hd*0.9]]
    ].forEach(pts => {
      ctx.beginPath(); pts.forEach(([px,py],i)=>i===0?ctx.moveTo(px,py):ctx.lineTo(px,py));
      ctx.strokeStyle='#FFAB40'; ctx.lineWidth=1.8; ctx.stroke();
    });
    ctx.shadowBlur=0;
    [[cx-hw*0.12,cy+hd*0.68],[cx+hw*0.18,cy+hd*0.82]].forEach(([bx,by]) => {
      ctx.beginPath(); ctx.arc(bx,by,3.5,0,Math.PI*2); ctx.fillStyle='#FF6D00'; ctx.fill();
      ctx.beginPath(); ctx.arc(bx-1,by-1,1.2,0,Math.PI*2); ctx.fillStyle='rgba(255,220,100,0.85)'; ctx.fill();
    });
  }

  function detailCloud(ctx, cx, cy, w, d) {
    const hd=d/2;
    [[cx-w*0.18,cy+hd*0.55,8],[cx,cy+hd*0.35,10],[cx+w*0.16,cy+hd*0.6,7]].forEach(([px,py,r]) => {
      ctx.beginPath(); ctx.arc(px,py,r,Math.PI,0); ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fill();
    });
  }

  function detailGem(ctx, cx, cy, w, d) {
    const hw=w/2, hd=d/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy+hd*0.2); ctx.lineTo(cx+hw*0.3,cy+hd*0.8);
    ctx.lineTo(cx,cy+hd*1.4); ctx.lineTo(cx-hw*0.3,cy+hd*0.8); ctx.closePath();
    ctx.strokeStyle='rgba(255,255,255,0.65)'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx-hw*0.3,cy+hd*0.8); ctx.lineTo(cx+hw*0.3,cy+hd*0.8);
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=0.8; ctx.stroke();
    ctx.shadowColor='#CE93D8'; ctx.shadowBlur=8;
    [[cx-hw*0.4,cy+hd*0.35],[cx+hw*0.38,cy+hd*0.45],[cx+hw*0.1,cy+hd*1.25]].forEach(([sx,sy]) => {
      ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(sx,sy,1.5,0,Math.PI*2); ctx.fill();
    });
    ctx.shadowBlur=0;
  }

  function detailGold(ctx, cx, cy, w, d) {
    const hw=w/2, hd=d/2, px=cx, py=cy+hd;
    ctx.beginPath();
    for (let i=0;i<12;i++) {
      const ang=(i/12)*Math.PI*2-Math.PI/2, r=i%2===0?12:5.5;
      const x=px+Math.cos(ang)*r, y=py+Math.sin(ang)*r*0.55;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1; ctx.stroke();
    ctx.shadowColor='#FFD600'; ctx.shadowBlur=10;
    [[cx-hw*0.38,cy+hd*0.3],[cx+hw*0.35,cy+hd*0.38],[cx-hw*0.12,cy+hd*1.28],[cx+hw*0.18,cy+hd*1.2]].forEach(([sx,sy]) => {
      ctx.fillStyle='#FFFFFF'; ctx.beginPath(); ctx.arc(sx,sy,1.8,0,Math.PI*2); ctx.fill();
    });
    ctx.shadowBlur=0;
  }

  // ── NEW 5 BLOCKS ────────────────────────────────────────────────────────────

  function detailVinyl(ctx, cx, cy, w, d) {
    const hd=d/2, px=cx, py=cy+hd;
    // Grooves (concentric ellipses)
    [16,13,10,7].forEach(r => {
      ctx.beginPath(); ctx.ellipse(px,py,r,r*0.56,0,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=0.8; ctx.stroke();
    });
    // Label circle
    ctx.beginPath(); ctx.ellipse(px,py,5,5*0.56,0,0,Math.PI*2);
    ctx.fillStyle='#E53935'; ctx.fill();
    // Label shine
    ctx.beginPath(); ctx.ellipse(px-1,py-0.8,2,1.2,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fill();
    // Spindle hole
    ctx.beginPath(); ctx.arc(px,py,0.8,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fill();
  }

  function detailBook(ctx, cx, cy, w, d, h) {
    const hw=w/2, hd=d/2, totalH=h*STACKS;
    // Page lines on top face
    for (let i=1;i<=4;i++) {
      const t=i/5;
      ctx.beginPath();
      ctx.moveTo(cx-hw*(1-t*0.6), cy+hd*(0.3+t*0.5));
      ctx.lineTo(cx+hw*(0.1+t*0.5), cy+hd*(0.3+t*0.5));
      ctx.strokeStyle=`rgba(0,0,0,${0.08+i*0.03})`; ctx.lineWidth=0.7; ctx.stroke();
    }
    // Spine visible on left face as a lighter strip
    ctx.beginPath();
    ctx.moveTo(cx-hw,cy+hd); ctx.lineTo(cx-hw*0.7,cy+hd*0.7);
    ctx.lineTo(cx-hw*0.7,cy+hd*0.7+totalH); ctx.lineTo(cx-hw,cy+hd+totalH);
    ctx.closePath(); ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fill();
    // Bookmark ribbon on right side of top face
    ctx.beginPath();
    ctx.moveTo(cx+hw*0.35,cy); ctx.lineTo(cx+hw*0.35,cy+D*0.35);
    ctx.lineTo(cx+hw*0.28,cy+D*0.42); ctx.lineTo(cx+hw*0.21,cy+D*0.35);
    ctx.lineTo(cx+hw*0.21,cy); ctx.closePath();
    ctx.fillStyle='#EF5350'; ctx.fill();
  }

  function detailCake(ctx, cx, cy, w, d, h) {
    const hw=w/2, hd=d/2, totalH=h*STACKS;
    // Frosting drips on left face
    [[cx-hw*0.6,cy+hd],[cx-hw*0.25,cy+hd],[cx,cy+D]].forEach(([dx,dy]) => {
      ctx.beginPath();
      ctx.arc(dx,dy+2,4,0,Math.PI,false);
      ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fill();
    });
    // Layer lines on left face (sponge)
    [0.4, 0.72].forEach(f => {
      const ly=cy+hd+totalH*f;
      ctx.beginPath();
      ctx.moveTo(cx-hw,ly); ctx.lineTo(cx,ly+hd); ctx.lineTo(cx+hw,ly);
      ctx.strokeStyle='rgba(255,220,200,0.45)'; ctx.lineWidth=1.2; ctx.stroke();
    });
    // Candle on top
    const cdx=cx, cdy=cy+hd*0.55;
    ctx.fillStyle='#FFF176'; ctx.fillRect(cdx-2,cdy-8,4,8);
    ctx.fillStyle='#FF7043'; ctx.beginPath();
    ctx.moveTo(cdx,cdy-11); ctx.lineTo(cdx+2,cdy-8); ctx.lineTo(cdx-2,cdy-8); ctx.closePath(); ctx.fill();
    // Sprinkles on top
    [[-hw*0.35,hd*0.45],[-hw*0.08,hd*0.75],[hw*0.22,hd*0.5],[hw*0.3,hd*0.9],[-hw*0.25,hd*1.0]].forEach(([ox,oy],i) => {
      const cols=['#FF8A80','#82B1FF','#CCFF90','#FFD180','#EA80FC'];
      ctx.fillStyle=cols[i%cols.length]; ctx.beginPath();
      ctx.ellipse(cx+ox,cy+oy,2.5,1,i*0.8,0,Math.PI*2); ctx.fill();
    });
  }

  function detailOreo(ctx, cx, cy, w, d, h) {
    const hw=w/2, hd=d/2, totalH=h*STACKS;
    // CREAM layer on left face (mid-height white stripe)
    const creamY=cy+hd+totalH*0.38, creamH=totalH*0.24;
    ctx.beginPath();
    ctx.moveTo(cx-hw,creamY); ctx.lineTo(cx,creamY+hd);
    ctx.lineTo(cx,creamY+hd+creamH); ctx.lineTo(cx-hw,creamY+creamH);
    ctx.closePath(); ctx.fillStyle='rgba(255,255,255,0.88)'; ctx.fill();
    // CREAM layer on right face
    ctx.beginPath();
    ctx.moveTo(cx+hw,creamY); ctx.lineTo(cx,creamY+hd);
    ctx.lineTo(cx,creamY+hd+creamH); ctx.lineTo(cx+hw,creamY+creamH);
    ctx.closePath(); ctx.fillStyle='rgba(255,255,255,0.78)'; ctx.fill();
    // Emboss on top face: outer ring + radial pattern
    ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.ellipse(cx,cy+hd,18,10,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx,cy+hd,12,7,0,0,Math.PI*2); ctx.stroke();
    // Radial lines
    for (let i=0;i<12;i++) {
      const ang=(i/12)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(ang)*5,cy+hd+Math.sin(ang)*3);
      ctx.lineTo(cx+Math.cos(ang)*12,cy+hd+Math.sin(ang)*7);
      ctx.stroke();
    }
    // Center dots
    [[0,0],[-6,-3.5],[6,-3.5],[-6,3.5],[6,3.5]].forEach(([ox,oy]) => {
      ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.beginPath();
      ctx.arc(cx+ox,cy+hd+oy,1,0,Math.PI*2); ctx.fill();
    });
  }

  function detailCocaCola(ctx, cx, cy, w, d, h) {
    const hw=w/2, hd=d/2, totalH=h*STACKS;
    // Silver band at very top of left face
    const bandH = totalH * 0.22;
    ctx.beginPath();
    ctx.moveTo(cx-hw,cy+hd); ctx.lineTo(cx,cy+D);
    ctx.lineTo(cx,cy+D+bandH); ctx.lineTo(cx-hw,cy+hd+bandH);
    ctx.closePath(); ctx.fillStyle='rgba(200,210,220,0.55)'; ctx.fill();
    // Right face silver band
    ctx.beginPath();
    ctx.moveTo(cx+hw,cy+hd); ctx.lineTo(cx,cy+D);
    ctx.lineTo(cx,cy+D+bandH); ctx.lineTo(cx+hw,cy+hd+bandH);
    ctx.closePath(); ctx.fillStyle='rgba(180,195,210,0.45)'; ctx.fill();
    // Top face: silver aluminum circle (can opening)
    ctx.beginPath(); ctx.ellipse(cx,cy+hd,20,11,0,0,Math.PI*2);
    const alGrad = ctx.createRadialGradient(cx-3,cy+hd-2,2,cx,cy+hd,20);
    alGrad.addColorStop(0,'rgba(230,235,240,0.9)');
    alGrad.addColorStop(1,'rgba(170,185,195,0.7)');
    ctx.fillStyle=alGrad; ctx.fill();
    ctx.strokeStyle='rgba(150,165,175,0.5)'; ctx.lineWidth=0.8; ctx.stroke();
    // Pull tab
    ctx.beginPath();
    ctx.ellipse(cx+4,cy+hd-1,4,2.5,0.3,0,Math.PI*2);
    ctx.strokeStyle='rgba(120,135,145,0.8)'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+8,cy+hd-2,1.5,0,Math.PI*2);
    ctx.fillStyle='rgba(120,135,145,0.8)'; ctx.fill();
    // White wave logo stripe across top
    ctx.beginPath();
    ctx.moveTo(cx-hw*0.55,cy+hd*0.65);
    ctx.bezierCurveTo(cx-hw*0.2,cy+hd*0.45, cx+hw*0.1,cy+hd*0.9, cx+hw*0.5,cy+hd*0.72);
    ctx.strokeStyle='rgba(255,255,255,0.65)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  // ─── Block definitions ─────────────────────────────────────────────────────

  const BLOCKS = [
    // ── Row 1: Original designs ──────────────────────────────────────────────
    { id:'meadow',      name:'Meadow',       desc:'Flowers on top',     difficulty:'easy',   colors:{ top:'#88D44A', left:'#5AAD2A', right:'#4A9020' },                              detail: detailMeadow },
    { id:'sakura',      name:'Sakura',       desc:'Cherry blossom',     difficulty:'easy',   colors:{ top:'#F8BBD9', left:'#E091BB', right:'#C8709A' },                              detail: detailSakura },
    { id:'timber',      name:'Timber',       desc:'Tree rings',         difficulty:'mid',    colors:{ top:'#A0785A', left:'#7A5A3E', right:'#5E4330' },                              detail: detailTimber },
    { id:'cobblestone', name:'Cobblestone',  desc:'Stone grid',         difficulty:'mid',    colors:{ top:'#8C8C8C', left:'#6A6A6A', right:'#505050' },                              detail: detailCobblestone },
    { id:'crystal-ice', name:'Crystal Ice',  desc:'6-point crystal',    difficulty:'mid',    colors:{ top:'#B3E5FC', left:'#60C8F0', right:'#29B6F6' },                              detail: detailCrystalIce },
    // ── Row 2 ────────────────────────────────────────────────────────────────
    { id:'candy',       name:'Candy',        desc:'Double swirl',       difficulty:'mid',    colors:{ top:'#F48FB1', left:'#E0608A', right:'#C2426E' },                              detail: detailCandy },
    { id:'lava',        name:'Lava',         desc:'Glowing cracks',     difficulty:'hard',   colors:{ top:'#D84315', left:'#7F1F00', right:'#5C1500', glow:'rgba(255,109,0,0.4)' }, detail: detailLava },
    { id:'cloud',       name:'Cloud',        desc:'Soft & bouncy',      difficulty:'hard',   colors:{ top:'#FFFFFF', left:'#C9DCE8', right:'#ADC8D8' },                              detail: detailCloud },
    { id:'gem',         name:'Gem',          desc:'Faceted crystal',    difficulty:'expert', colors:{ top:'#7C3AED', left:'#5B21B6', right:'#3B0A8C', glow:'rgba(167,139,250,0.5)'},detail: detailGem },
    { id:'gold',        name:'Gold',         desc:'Star + sparkles',    difficulty:'expert', colors:{ top:'#FFD600', left:'#FFB300', right:'#E65100', glow:'rgba(255,214,0,0.5)' }, detail: detailGold },
    // ── Row 3: 5 new designs ─────────────────────────────────────────────────
    { id:'vinyl',       name:'Vinyl',        desc:'Record grooves',     difficulty:'mid',    colors:{ top:'#212121', left:'#0D0D0D', right:'#080808' },                              detail: detailVinyl },
    { id:'book',        name:'Book',         desc:'Pages + bookmark',   difficulty:'mid',    colors:{ top:'#1565C0', left:'#0D47A1', right:'#0A3880' },                              detail: detailBook },
    { id:'cake',        name:'Cake',         desc:'Frosting + candle',  difficulty:'hard',   colors:{ top:'#F48FB1', left:'#EC4899', right:'#BE185D' },                              detail: detailCake },
    { id:'oreo',        name:'Oreo',         desc:'Cream filling',      difficulty:'hard',   colors:{ top:'#1A1A1A', left:'#111111', right:'#0A0A0A' },                              detail: detailOreo },
    { id:'coca-cola',   name:'Coca Cola',    desc:'Can top + wave',     difficulty:'expert', colors:{ top:'#CC0000', left:'#990000', right:'#770000', glow:'rgba(220,50,50,0.35)' },detail: detailCocaCola },
  ];

  const DIFF = { easy:'Easy', mid:'Mid', hard:'Hard', expert:'Expert' };
  const SECTION = { 0:'Original 10 designs', 10:'5 New designs' };

  const grid = document.getElementById('grid');
  const CVS_W=170, CVS_H=130;

  BLOCKS.forEach((block, idx) => {
    if (SECTION[idx]) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = SECTION[idx];
      grid.appendChild(lbl);
    }

    const card = document.createElement('div');
    card.className = 'card';

    const cvs = document.createElement('canvas');
    cvs.className = 'block-canvas';
    cvs.width = CVS_W; cvs.height = CVS_H;
    const ctx = cvs.getContext('2d');
    ctx.clearRect(0, 0, CVS_W, CVS_H);

    const cx = CVS_W / 2;
    const totalH = H * STACKS;
    const cy = (CVS_H - D - totalH) / 2 - 4;
    drawIsoBlock(ctx, cx, cy, block.colors, block.detail);

    const name = document.createElement('div');
    name.className = 'block-name'; name.textContent = block.name;
    const diff = document.createElement('span');
    diff.className = `difficulty diff-${block.difficulty}`; diff.textContent = DIFF[block.difficulty];
    const meta = document.createElement('div');
    meta.className = 'block-meta'; meta.textContent = block.desc;

    card.append(cvs, name, diff, meta);
    grid.appendChild(card);
  });
  </script>
</body>
</html>
